name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ updated
        with:
          submodules: recursive     # 🔥 CRITICAL FIX
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3   # ✅ updated
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4   # ✅ updated
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public